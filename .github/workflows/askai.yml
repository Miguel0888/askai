name: AskAI Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build AskAI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build fat jar
        run: |
          chmod +x ./gradlew
          ./gradlew shadowJar

      - name: Verify artifact
        run: |
          test -f build/libs/askai-all.jar
          ls -lh build/libs/askai-all.jar

      - name: Publish rolling release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: askai-latest
        run: |
          gh release delete "$TAG_NAME" --yes --cleanup-tag || true
          git tag -f "$TAG_NAME"
          git push origin "$TAG_NAME" --force
          gh release create "$TAG_NAME" \
            build/libs/askai-all.jar \
            --title "AskAI (latest)" \
            --notes "Automated AskAI release from commit $GITHUB_SHA."