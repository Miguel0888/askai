name: AskAI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build AskAI fat jar
        run: |
          chmod +x ./gradlew
          ./gradlew shadowJar

      - name: Verify release inputs
        run: |
          test -f build/libs/askai-all.jar
          test -f packaging/launcher.ps1
          ls -l build/libs/askai-all.jar
          ls -l packaging/launcher.ps1

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: askai-all
          path: build/libs/askai-all.jar

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-ps1
          path: packaging/launcher.ps1

      - name: Delete existing release (if any)
        run: gh release delete askai-latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing tag (if any)
        run: git push --delete origin askai-latest || true

      - name: Create rolling release with jar
        run: |
          gh release create askai-latest \
            build/libs/askai-all.jar \
            --title "AskAI (latest)" \
            --notes "Rolling release of the AskAI standalone fat jar. Requires Java 21 or newer. Download askai-all.jar and launcher.ps1 into the same directory, then run: powershell -ExecutionPolicy Bypass -File .\\launcher.ps1" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload launcher release asset
        run: gh release upload askai-latest packaging/launcher.ps1 --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release assets
        run: gh release view askai-latest --json assets --jq '.assets[].name'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
